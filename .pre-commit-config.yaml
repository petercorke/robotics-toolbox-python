repos:
  # Enforce Conventional Commits format on every local commit message.
  # Install once: pip install pre-commit && pre-commit install --hook-type commit-msg
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          # Types that are allowed — must match commitlint.yml
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
          - deps
